<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Map Project Template</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://fonts.googleapis.com/css?family=Titillium+Web|Oswald" rel="stylesheet">
    <link href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/c3/0.7.20/c3.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Titillium Web', serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        #info {
            z-index: 1000;
            position: absolute;
            width: 500px;
            max-width: calc(100% - 20px);
            top: 1%;
            bottom: 1%;
            left: .5%;
            padding: 18px 15px;
            background: #343a40;
            color: white;
            overflow-y: auto;
            border-radius: 4px;
        }
        #info a { color: lightgray; }
        #info a:hover { color: white; opacity: 0.7; }
        #title { font-size: 25px; font-family: 'Oswald', sans-serif; margin-bottom: 14px; }
        #title span { font-size: 14px; float: right; margin-right: 10px; margin-top: 8px; }
        #desc { text-align: center; color: lightgray; font-size: medium; font-weight: bold; margin-bottom: 0; }
        #collision-count { margin: 0; text-align: center; color: #58c4dd; font-size: 50px; line-height: 1.1; }
        #severity-chart { margin-top: 10px; }
        .card {
            margin-top: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 4px;
        }
        .section-title { margin: 0 0 8px 0; font-family: 'Oswald', sans-serif; font-size: 17px; letter-spacing: 0.4px; }
        .control-label { display: block; margin: 6px 0; color: #e9ecef; font-size: 14px; }
        .control-label input { margin-right: 8px; }
        .btn {
            margin-top: 8px;
            border: 1px solid #adb5bd;
            background: transparent;
            color: #f8f9fa;
            padding: 6px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.12); }
        .btn:disabled { cursor: not-allowed; opacity: 0.6; }
        #progress { margin: 8px 0 0 0; font-size: 12px; color: #adb5bd; }
        #risk-list { max-height: 240px; overflow-y: auto; }
        .risk-item { border-bottom: 1px solid rgba(255, 255, 255, 0.15); padding: 6px 0; cursor: pointer; }
        .risk-item:last-child { border-bottom: 0; }
        .risk-meta { font-size: 12px; color: #ced4da; }
        #footer { margin-top: 12px; margin-right: 4px; font-size: 13px; line-height: 150%; color: lightgray; }
        #legend {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 200px;
            background: #fff;
            margin-right: 20px;
            margin-bottom: 40px;
            padding: 10px 12px;
            border-radius: 3px;
            color: #1f2933;
            font-size: 13px;
        }
        .break { position: relative; margin: 0; padding: 0; min-height: 20px; }
        .dot { display: inline-block; margin-top: 4px; border-radius: 50%; opacity: 0.8; }
        .dot-label { position: absolute; top: 0; right: 0; font-style: italic; color: #1f2933; }
        .line-swatch { display: inline-block; width: 24px; height: 4px; margin-right: 6px; vertical-align: middle; border-radius: 2px; }
        .c3 text { fill: #e9ecef; font-size: 11px; }
        .c3-axis path, .c3-axis line, .c3-grid line { stroke: rgba(255, 255, 255, 0.25); }
        @media (max-width: 900px) {
            #info { width: calc(100% - 20px); left: 10px; right: 10px; top: 10px; bottom: auto; max-height: 62%; }
            #legend { right: 8px; margin-right: 0; margin-bottom: 10px; }
        }
    </style>
    <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/5.16.0/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/c3/0.7.20/c3.min.js"></script>
</head>
<body>
    <div id="info">
        <div id="title">
            Project Title
            <span><a href="#" target="_blank"><i class="bi bi-github"></i></a></span>
            <span><a href="#" target="_blank"><i class="bi bi-globe"></i></a></span>
            <span id="reset"><a href="#">reset</a></span>
        </div>

        <div id="count" class="card">
            <h5 id="desc"># Features in the Displaying Region</h5>
            <p id="collision-count">0</p>
        </div>

        <div id="severity-chart"></div>

        <div class="card">
            <h5 class="section-title">Layers & Analysis</h5>
            <label class="control-label"><input type="checkbox" id="toggle-volume" checked>Layer A (line)</label>
            <label class="control-label"><input type="checkbox" id="toggle-risk" checked>Layer B (derived)</label>
            <label class="control-label"><input type="checkbox" id="toggle-collisions" checked>Layer C (point)</label>
            <button id="compute-risk" class="btn">Run analysis</button>
            <p id="progress">Analysis not computed yet.</p>
        </div>

        <div class="card">
            <h5 class="section-title">Top Results</h5>
            <div id="risk-list">Analysis not computed yet.</div>
        </div>

        <div id="footer">
            Data sources: replace with your own sources. This template keeps the original code organization and interaction flow.
        </div>
    </div>

    <div id="map"></div>
    <div id="legend"></div>

    <script>
        // TODO: replace with your own files
        const collisionsUrl = 'assets/points.geojson';
        const flowUrl = 'assets/lines.geojson';

        const initialView = {
            center: [-122.3321, 47.6062],
            zoom: 11.2
        };

        let map = null;
        let flowsWgs = null;
        let collisionsWgs = null;
        let severityChart = null;

        const legend = document.getElementById('legend');
        const collisionGrades = ['Category A', 'Category B', 'Category C'];
        const collisionColors = ['#d7191c', '#fdae61', '#2b83ba'];
        const collisionRadii = [9, 7, 6];

        const labels = ['<strong>Legend</strong>'];
        for (let i = 0; i < collisionGrades.length; i += 1) {
            const radius = collisionRadii[i];
            labels.push(
                '<p class="break"><i class="dot" style="background:' + collisionColors[i] + '; width: ' + (radius * 2) +
                'px; height: ' + (radius * 2) + 'px;"></i> <span class="dot-label" style="top: ' + radius + 'px;">' +
                collisionGrades[i] + '</span></p>'
            );
        }
        labels.push('<p style="margin:8px 0 0 0;"><span class="line-swatch" style="background:#00b4ff"></span>Layer A</p>');
        labels.push('<p style="margin:4px 0 0 0;"><span class="line-swatch" style="background:#d73027"></span>Layer B</p>');
        legend.innerHTML = labels.join('');

        function reprojectGeometry(geometry) {
            if (!geometry) return null;
            return geometry;
        }

        function reprojectFeature(feature) {
            const geometry = reprojectGeometry(feature.geometry);
            if (!geometry) return null;
            return { ...feature, geometry };
        }

        async function loadData() {
            const [collisions, flows] = await Promise.all([
                fetch(collisionsUrl).then(response => response.json()),
                fetch(flowUrl).then(response => response.json())
            ]);

            collisionsWgs = {
                type: 'FeatureCollection',
                features: collisions.features.map(reprojectFeature).filter(Boolean)
            };

            flowsWgs = {
                type: 'FeatureCollection',
                features: flows.features.map(reprojectFeature).filter(Boolean)
            };
        }

        function getFeatureId(feature, index) {
            const properties = feature.properties || {};
            if (properties.OBJECTID !== undefined && properties.OBJECTID !== null) return String(properties.OBJECTID);
            const coordinates = feature.geometry && feature.geometry.coordinates ? feature.geometry.coordinates : [index];
            return coordinates.join(',');
        }

        function updateSummaryPanel() {
            if (!map || !map.getLayer('collisions')) return;

            const rendered = map.queryRenderedFeatures({ layers: ['collisions'] });
            const seen = new Set();
            const counts = { a: 0, b: 0, c: 0, other: 0 };

            rendered.forEach((feature, index) => {
                const id = getFeatureId(feature, index);
                if (seen.has(id)) return;
                seen.add(id);

                const category = String((feature.properties && feature.properties.category) || '').toLowerCase();
                if (category === 'a') counts.a += 1;
                else if (category === 'b') counts.b += 1;
                else if (category === 'c') counts.c += 1;
                else counts.other += 1;
            });

            document.getElementById('collision-count').textContent = seen.size.toLocaleString();

            const columns = [
                ['Category A', counts.a],
                ['Category B', counts.b],
                ['Category C', counts.c],
                ['Other', counts.other]
            ];

            if (!severityChart) {
                severityChart = c3.generate({
                    bindto: '#severity-chart',
                    data: {
                        columns,
                        type: 'bar',
                        colors: {
                            'Category A': '#d7191c',
                            'Category B': '#fdae61',
                            'Category C': '#2b83ba',
                            Other: '#7b8b9f'
                        }
                    },
                    axis: {
                        x: { type: 'category', categories: ['Visible features'] },
                        y: { tick: { format: d3.format('d') } }
                    },
                    bar: { width: { ratio: 0.8 } },
                    legend: { position: 'right' },
                    size: { height: 210 },
                    padding: { top: 8, right: 8, bottom: 8, left: 36 }
                });
            } else {
                severityChart.load({ columns });
            }
        }

        function buildSpatialIndex(flowData, cellSize) {
            const index = new Map();
            const bboxes = [];
            flowData.features.forEach((feature, featureIndex) => {
                if (!feature.geometry) return;
                const bbox = turf.bbox(feature);
                bboxes[featureIndex] = bbox;
                const minCellX = Math.floor(bbox[0] / cellSize);
                const maxCellX = Math.floor(bbox[2] / cellSize);
                const minCellY = Math.floor(bbox[1] / cellSize);
                const maxCellY = Math.floor(bbox[3] / cellSize);
                for (let cellX = minCellX; cellX <= maxCellX; cellX += 1) {
                    for (let cellY = minCellY; cellY <= maxCellY; cellY += 1) {
                        const key = `${cellX},${cellY}`;
                        if (!index.has(key)) index.set(key, []);
                        index.get(key).push(featureIndex);
                    }
                }
            });
            return { index, bboxes };
        }

        function computeRiskAsync(flowData, collisionData, callbacks) {
            const matches = new Array(flowData.features.length).fill(0);
            const cellSize = 0.02;
            const searchRadiusCells = 1;
            const { index, bboxes } = buildSpatialIndex(flowData, cellSize);
            const total = collisionData.features.length;
            let current = 0;

            function step() {
                const frameStart = performance.now();
                while (current < total && performance.now() - frameStart < 20) {
                    const collision = collisionData.features[current];
                    current += 1;
                    if (!collision || !collision.geometry) continue;

                    const lng = collision.geometry.coordinates[0];
                    const lat = collision.geometry.coordinates[1];
                    const centerX = Math.floor(lng / cellSize);
                    const centerY = Math.floor(lat / cellSize);
                    const candidates = new Set();

                    for (let dx = -searchRadiusCells; dx <= searchRadiusCells; dx += 1) {
                        for (let dy = -searchRadiusCells; dy <= searchRadiusCells; dy += 1) {
                            const key = `${centerX + dx},${centerY + dy}`;
                            const candidateIds = index.get(key);
                            if (candidateIds) candidateIds.forEach(id => candidates.add(id));
                        }
                    }

                    let nearestFeatureIndex = -1;
                    let nearestDistance = Infinity;
                    candidates.forEach(featureIndex => {
                        const flowFeature = flowData.features[featureIndex];
                        if (!flowFeature || !flowFeature.geometry) return;
                        const bbox = bboxes[featureIndex];
                        if (lng < bbox[0] - cellSize || lng > bbox[2] + cellSize || lat < bbox[1] - cellSize || lat > bbox[3] + cellSize) return;
                        const snapped = turf.nearestPointOnLine(
                            { type: flowFeature.geometry.type, coordinates: flowFeature.geometry.coordinates },
                            collision.geometry
                        );
                        if (!snapped || !snapped.properties || typeof snapped.properties.dist !== 'number') return;
                        if (snapped.properties.dist < nearestDistance) {
                            nearestDistance = snapped.properties.dist;
                            nearestFeatureIndex = featureIndex;
                        }
                    });

                    if (nearestFeatureIndex >= 0) matches[nearestFeatureIndex] += 1;
                }

                if (callbacks.onProgress) callbacks.onProgress(current, total);
                if (current < total) return setTimeout(step, 0);

                const scores = flowData.features.map((feature, index) => {
                    const metric = Number((feature.properties && feature.properties.metric) || 0);
                    const hits = matches[index];
                    const score = hits / (metric + 1);
                    return { index, name: (feature.properties && feature.properties.name) || 'Segment', metric, hits, score };
                });

                if (callbacks.onDone) callbacks.onDone(scores);
            }

            step();
        }

        function renderTopSegments(scores) {
            const list = document.getElementById('risk-list');
            list.innerHTML = '';
            scores
                .filter(item => item.metric > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, 12)
                .forEach((item, rank) => {
                    const row = document.createElement('div');
                    row.className = 'risk-item';
                    row.innerHTML = `<strong>#${rank + 1} ${item.name}</strong><div class="risk-meta">Hits: ${item.hits} | Metric: ${item.metric} | Score: ${item.score.toFixed(5)}</div>`;
                    row.addEventListener('click', () => {
                        const segment = flowsWgs.features[item.index];
                        if (!segment) return;
                        const bbox = turf.bbox(segment);
                        map.fitBounds([[bbox[0], bbox[1]], [bbox[2], bbox[3]]], { padding: 40, maxZoom: 16 });
                    });
                    list.appendChild(row);
                });

            if (!list.childElementCount) list.textContent = 'No results to display.';
        }

        function setupToggle(controlId, layerId) {
            const control = document.getElementById(controlId);
            const sync = () => {
                if (!map || !map.getLayer(layerId)) return;
                map.setLayoutProperty(layerId, 'visibility', control.checked ? 'visible' : 'none');
                updateSummaryPanel();
            };
            control.addEventListener('change', sync);
            sync();
        }

        async function initializeMap() {
            await loadData();

            const mapStyle = {
                version: 8,
                sources: {
                    cartoDark: {
                        type: 'raster',
                        tiles: [
                            'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
                            'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
                            'https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'
                        ],
                        tileSize: 256,
                        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
                    }
                },
                layers: [{ id: 'cartoDark', type: 'raster', source: 'cartoDark' }]
            };

            map = new maplibregl.Map({
                container: 'map',
                style: mapStyle,
                center: initialView.center,
                zoom: initialView.zoom,
                attributionControl: false
            });

            map.addControl(new maplibregl.NavigationControl(), 'top-right');
            map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');

            map.on('load', () => {
                map.addSource('flows', { type: 'geojson', data: flowsWgs });
                map.addSource('collisions', { type: 'geojson', data: collisionsWgs });

                map.addLayer({
                    id: 'volume',
                    type: 'line',
                    source: 'flows',
                    paint: {
                        'line-color': '#00b4ff',
                        'line-width': 3,
                        'line-opacity': 0.9
                    }
                });

                map.addLayer({
                    id: 'risk',
                    type: 'line',
                    source: 'flows',
                    paint: {
                        'line-color': '#d73027',
                        'line-width': 3.5,
                        'line-opacity': 0.95
                    }
                });

                map.addLayer({
                    id: 'collisions',
                    type: 'circle',
                    source: 'collisions',
                    paint: {
                        'circle-radius': 6,
                        'circle-color': '#2b83ba',
                        'circle-opacity': 0.85,
                        'circle-stroke-color': '#0b1526',
                        'circle-stroke-width': 1
                    }
                });

                map.on('click', 'collisions', event => {
                    const p = event.features[0].properties || {};
                    new maplibregl.Popup()
                        .setLngLat(event.lngLat)
                        .setHTML(`<b>${p.name || 'Feature'}</b><br>Category: ${p.category || 'n/a'}`)
                        .addTo(map);
                });

                map.on('click', 'risk', event => {
                    const p = event.features[0].properties || {};
                    new maplibregl.Popup()
                        .setLngLat(event.lngLat)
                        .setHTML(`<b>Derived Layer</b><br>Name: ${p.name || 'Segment'}<br>Score: ${p.risk_score || 0}`)
                        .addTo(map);
                });

                setupToggle('toggle-volume', 'volume');
                setupToggle('toggle-risk', 'risk');
                setupToggle('toggle-collisions', 'collisions');

                map.on('idle', updateSummaryPanel);
                map.on('moveend', updateSummaryPanel);
                updateSummaryPanel();
            });
        }

        document.getElementById('compute-risk').addEventListener('click', () => {
            if (!map || !map.getSource('flows')) return;

            const button = document.getElementById('compute-risk');
            const progress = document.getElementById('progress');
            button.disabled = true;
            button.textContent = 'Computing...';
            progress.textContent = 'Starting analysis...';

            computeRiskAsync(flowsWgs, collisionsWgs, {
                onProgress: (done, total) => {
                    progress.textContent = `Computing: ${done}/${total}`;
                },
                onDone: scores => {
                    flowsWgs = {
                        ...flowsWgs,
                        features: flowsWgs.features.map((feature, index) => ({
                            ...feature,
                            properties: {
                                ...feature.properties,
                                hits: scores[index].hits,
                                risk_score: scores[index].score
                            }
                        }))
                    };
                    map.getSource('flows').setData(flowsWgs);
                    renderTopSegments(scores);
                    progress.textContent = 'Analysis ready.';
                    button.textContent = 'Recompute analysis';
                    button.disabled = false;
                }
            });
        });

        document.getElementById('reset').addEventListener('click', event => {
            event.preventDefault();
            if (!map) return;
            map.flyTo({ center: initialView.center, zoom: initialView.zoom });
        });

        initializeMap().catch(error => {
            console.error(error);
            document.getElementById('progress').textContent = 'Failed to load data. Check console for details.';
        });
    </script>
</body>
</html>
